<div id="list-page">
  <div class="demo-topbar">
    <div class="demo-title">
      <h1>Demo2 Files</h1>
      <p>Fast file operations with a clean, modern workspace.</p>
    </div>
    <div class="demo-user">
      <div class="div-image" title="Current user avatar">
        <img
          src="/user/avatar/{{.UserId}}"
          alt="User avatar"
          loading="lazy"
          decoding="async"
          referrerpolicy="no-referrer"
          onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 72 72%22><defs><linearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%221%22 y2=%221%22><stop offset=%220%25%22 stop-color=%22%2360a5fa%22/><stop offset=%22100%25%22 stop-color=%22%233b82f6%22/></linearGradient></defs><circle cx=%2236%22 cy=%2236%22 r=%2234%22 fill=%22url(%23g)%22/><circle cx=%2236%22 cy=%2236%22 r=%2231%22 fill=%22rgba(255,255,255,0.12)%22/><text x=%2236%22 y=%2244%22 font-size=%2230%22 font-family=%22Arial,sans-serif%22 text-anchor=%22middle%22 fill=%22white%22 font-weight=%22700%22>U</text></svg>';"
        />
      </div>
      <button id="logout-btn" type="button">Logout</button>
    </div>
  </div>

  <div class="demo-actions">
    <button id="new-btn" class="demo-btn-primary" type="button">+ New File</button>
    <button id="import-btn" class="demo-btn-secondary" type="button">Import File</button>
    <button id="delete-btn" class="demo-btn-danger" type="button">Delete Selected</button>
  </div>

  <input type="file" id="file" style="display: none;"/>

  <div id="div-form" class="demo-card">
    <form id="form" action="" method="post" enctype="multipart/form-data">
      <label><b>Name</b></label>
      <input type="text" placeholder="Enter Name" name="name" required>

      <label><b>Type</b></label>
      <div class="form-row">
        <label><input type="radio" name="type" value="doc" checked>doc</label>
        <label><input type="radio" name="type" value="sheet">sheet</label>
      </div>

      <div class="form-actions">
        <button id="form-new-btn" class="demo-btn-primary" type="submit">Create</button>
        <button id="form-cancel-btn" class="demo-btn-secondary" type="button">Cancel</button>
      </div>
    </form>
  </div>

  <div class="demo-card">
    <div class="demo-list-head">
      <h2>File list</h2>
    </div>

    <div class="file-list">
      {{ range .Files }}
      <div onclick="checkBox(event)" class="file-row hover-effect">
        <input type="checkbox" name="fileIds" class="fileCheckbox file-check" value="{{.ID}}"/>
        <div class="file-name">
          {{ if (eq .UnitType 1) }}
          <a href="{{$.DocHost}}/?unit={{.UnitId}}&type=1">{{.Name}}.docx</a>
          {{ else if (eq .UnitType 2) }}
          <a href="{{$.SheetHost}}/?unit={{.UnitId}}&type=2">{{.Name}}.xlsx</a>
          {{ end }}
        </div>
        <label class="file-updated">{{.UpdatedAt}}</label>
        <div class="file-actions">
          <a href="/file/export?fileId={{.ID}}">Export</a>
          <button class="demo-btn-secondary" type="button" onclick="showDialog(event)" fileId="{{.ID}}">Invite</button>
        </div>
      </div>
      {{ end }}
    </div>
  </div>

  <dialog id="dialog" class="dialog-panel">
    <div id="dialog-msg"></div>
    <hr>
    <span style="margin-right: 10px;">Role</span>
    <select id="select-role" style="width: 120px; display: inline-block; margin-bottom: 0;">
      <option value="reader">Reader</option>
      <option value="editor">Editor</option>
    </select>
    <div class="dialog-actions">
      <button id="dialog-ok-btn" class="demo-btn-primary" type="button">OK</button>
      <button id="dialog-cancel-btn" class="demo-btn-secondary" type="button">Cancel</button>
    </div>
  </dialog>
</div>

<div id="loading" style="visibility: hidden;">
  {{ render "shared/loading.html" . }}
</div>

<script type="text/javascript">
  function checkBox(event) {
    if (event.target.closest('.file-actions') || event.target.matches('a') || event.target.matches('button')) {
      return;
    }
    let row = event.currentTarget;
    let target = row.querySelector('.fileCheckbox');
    if (target && !event.target.matches('input[type="checkbox"]')) {
      target.checked = !target.checked;
    }
  }

  document.getElementById("new-btn").addEventListener('click', function() {
    document.getElementById('div-form').classList.add('is-visible');
  });

  document.getElementById("import-btn").addEventListener('click', function() {
    document.getElementById('file').click();
  });

  document.getElementById('file').onchange = function() {
    let file = document.getElementById('file').files[0];
    let formData = new FormData();
    formData.append('file', file);
    formData.append('size', file.size);
    let type = file.name.split('.').pop().toLowerCase();
    switch (type) {
      case 'doc':
        formData.append('type', 'doc');
        break;
      case 'docx':
        formData.append('type', 'doc');
        break;
      case 'xlsx':
        formData.append('type', 'sheet');
        break;
      default:
        alert('Invalid file type');
        return;
    }
    formData.append('name', file.name.split('.')[0]);

    document.getElementById('list-page').style.visibility = 'hidden';
    document.getElementById('loading').style.visibility = 'visible';

    fetch('/file/import', {
      method: 'POST',
      body: formData,
    }).then(resp => {
      if (resp.redirected) {
        window.location.href = resp.url;
      } else {
        alert('Import failed');
        document.getElementById('list-page').style.visibility = 'visible';
        document.getElementById('loading').style.visibility = 'hidden';
      }
    }).catch(err => {
      alert('Import failed');
      document.getElementById('list-page').style.visibility = 'visible';
      document.getElementById('loading').style.visibility = 'hidden';
    });
  };

  document.getElementById("form-new-btn").addEventListener('click', function() {
    document.getElementById('form').onsubmit = function() { return true; };
    document.getElementById('form').action = '/file/new';
  });

  document.getElementById("form-cancel-btn").addEventListener('click', function() {
    document.getElementById('div-form').classList.remove('is-visible');
    document.getElementById('form').onsubmit = function() { return false; };
  });

  document.getElementById("logout-btn").addEventListener('click', function() {
    window.location.href = '/user/logout';
  });

  document.getElementById("delete-btn").addEventListener('click', function() {
    let param = new URLSearchParams();
    document.querySelectorAll('.fileCheckbox').forEach(function(checkbox) {
      if (checkbox.checked) {
        param.append('fileIds', checkbox.value);
      }
    });
    if (param.size === 0) {
      alert('Please select files to delete');
      return;
    }
    fetch('/file?'+param.toString(), {
      method: 'DELETE',
    }).then(resp => {
      window.location.href = "";
    });
  });

  async function getPeople(next) {
    let resp = await fetch(`/user/people?next=${next}&size=10`)
    let data = await resp.json();
    return data;
  }

  var currentUserId = "{{.UserId}}";
  var invite = [];
  var pageStack = [];
  var inviteFileId = 0;

  function showPeople(data) {
    let people = data.users;
    let dialogMsg = document.getElementById('dialog-msg');
    dialogMsg.innerHTML = '';
    people.forEach(person => {
      let div = document.createElement('div');
      div.className = 'dialog-people-row';
      let span = document.createElement('span');
      span.innerText = person.nickname;
      let checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.value = person.user_id;
      checkbox.className = 'inviteCheckbox';
      checkbox.checked = invite.includes(person.user_id);
      checkbox.onchange = function() {
        if (checkbox.checked && checkbox.value !== currentUserId) {
          invite.push(checkbox.value);
        } else {
          invite = invite.filter(id => id !== checkbox.value);
        }
      };
      if (person.user_id === currentUserId) {
        checkbox.disabled = true;
        span.innerText += ' (You)';
      }
      div.onclick = function() {
        checkbox.click();
      };
      div.appendChild(span);
      div.appendChild(checkbox);
      dialogMsg.appendChild(div);
    });
    if (pageStack.length>1 || data.next != 0) {
      let div = document.createElement('div');
      div.style.height = '20px';
      div.style.padding = '5px';
      if (pageStack.length>1) {
        let page = pageStack[pageStack.length - 2];
        let prevSpan = document.createElement('span');
        prevSpan.innerText = '<';
        prevSpan.style.color = 'blue';
        prevSpan.style.position = 'absolute';
        prevSpan.style.left = '30px';
        prevSpan.onclick = function() {
          getPeople(page.prev).then(newData => {
            pageStack.pop();
            showPeople(newData);
          });
        };
        div.appendChild(prevSpan);
      }
      if (data.next != 0) {
        let nextSpan = document.createElement('span');
        nextSpan.innerText = '>';
        nextSpan.style.color = 'blue';
        nextSpan.style.position = 'absolute';
        nextSpan.style.right = '30px';
        nextSpan.onclick = function() {
          getPeople(data.next).then(newData => {
            pageStack.push({prev: data.next});
            showPeople(newData);
          });
        };
        div.appendChild(nextSpan);
      }
      dialogMsg.appendChild(div);
    }
    document.getElementById('dialog').showModal();
  }

  function showDialog(event) {
    inviteFileId = event.target.getAttribute('fileId');
    invite = [];
    pageStack = [];
    getPeople(0).then(data => {
      pageStack.push({prev: 0});
      showPeople(data);
    });
  }

  document.getElementById("dialog-cancel-btn").addEventListener('click', function() {
    document.getElementById('dialog').close();
  });

  document.getElementById("dialog-ok-btn").addEventListener('click', function() {
    fetch('/file/join', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        userIds: invite,
        fileId: parseInt(inviteFileId),
        role: document.getElementById("select-role").value,
      }),
    }).then(resp => {
      if (resp.status === 200) {
        document.getElementById('dialog').close();
        alert('Invite success');
      } else {
        alert('Invite failed');
      }
    });
  });
</script>
